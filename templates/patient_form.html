<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patient Form</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body { 
    background: #f0f8ff; 
    font-family: Arial, sans-serif; 
    display: flex; 
    justify-content: center; 
    align-items: center; 
    min-height: 100vh; 
}
.container { 
    width: 100%; 
    max-width: 600px; 
    background: white; 
    padding: 30px; 
    border-radius: 15px; 
    box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
}
h2 { text-align: center; color: #1E90FF; margin-bottom: 20px; }
.btn-custom { background-color: #1E90FF; color: white; border-radius: 50px; font-weight: bold; }
.btn-custom:hover { background-color: #ff6f61; color: white; }
.alert { display: none; margin-top: 15px; }
</style>
</head>
<body>
<div class="container">
    <h2>Patient Details Form</h2>
    <div id="alert" class="alert alert-success text-center"></div>

    <form id="patientForm" enctype="multipart/form-data">
        <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" name="patientName" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Age</label>
            <input type="number" name="age" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Gender</label>
            <select name="gender" class="form-control" required>
                <option value="">Select</option>
                <option>Male</option>
                <option>Female</option>
                <option>Other</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Contact Number</label>
            <input type="text" name="contact" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Address</label>
            <textarea name="address" class="form-control" rows="2"></textarea>
        </div>
        <div class="mb-3">
            <label class="form-label">Disease / Issue</label>
            <input type="text" name="disease" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Upload Patient Photo</label>
            <input type="file" name="photo" class="form-control" accept="image/*">
        </div>

        <button type="submit" class="btn btn-custom w-100">Submit</button>
    </form>

    <hr>
    <a href="/view_patients" class="btn btn-success w-100">👁️ View Patient Form</a>
</div>

<script>
document.getElementById('patientForm').addEventListener('submit', function(e){
    e.preventDefault();
    let formData = new FormData(this);

    fetch('/add_patient', {
        method: 'POST',
        body: formData
    }).then(res => res.json())
      .then(data => {
          if(data.status === "success"){
              let alertBox = document.getElementById('alert');
              alertBox.style.display = 'block';
              alertBox.innerText = "✅ Patient Form Submitted Successfully!";
              setTimeout(() => alertBox.style.display = 'none', 3000);
              document.getElementById('patientForm').reset();
          }
      });
});
</script>
</body>
</html>
