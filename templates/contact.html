<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us - Lifeline Multispeciality Hospital</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body {
  font-family: 'Arial', sans-serif;
  background: #f0f8ff;
  margin: 0;
  padding: 0;
}

header {
  background: #1E90FF;
  color: white;
  padding: 20px;
  text-align: center;
}

.container {
  max-width: 700px;
  margin: 60px auto;
  background: white;
  border-radius: 15px;
  padding: 30px;
  box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
}

h2 {
  color: #1E90FF;
  font-weight: bold;
  margin-bottom: 25px;
}

.form-control {
  border-radius: 10px;
  margin-bottom: 20px;
}

button {
  background: #1E90FF;
  color: white;
  border: none;
  border-radius: 25px;
  padding: 10px 20px;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #ff6f61;
}

/* Contact Info */
.contact-info {
  background: #eaf4ff;
  border-radius: 10px;
  padding: 20px;
  margin-top: 30px;
  text-align: center;
  box-shadow: 0 3px 10px rgba(0,0,0,0.1);
}
.contact-info h4 {
  color: #1E90FF;
  font-weight: bold;
}
.contact-info p {
  margin: 5px 0;
  color: #333;
  font-size: 1.1rem;
}
</style>
</head>
<body>

<header>
  <h1>Contact Us</h1>
  <p>We’re here to help you 24/7</p>
</header>

<div class="container">
  <h2>Get in Touch</h2>
  <form id="contactForm">
    <input type="text" class="form-control" placeholder="Your Name" required>
    <input type="email" class="form-control" placeholder="Your Email" required>
    <textarea class="form-control" rows="5" placeholder="Your Message" required></textarea>
    <div class="text-center">
      <button type="submit">Send Message</button>
    </div>
  </form>

  <!-- ✅ Contact Info Section -->
  <div class="contact-info mt-4">
    <h4>Hospital Contact Information</h4>
    <p><strong>📞 Mobile:</strong> +91 98765 43210</p>
    <p><strong>🆘 Helpdesk:</strong> helpdesk@lifelinehospital.com</p>
    <p><strong>🏥 Address:</strong> Lifeline Multispeciality Hospital, Pune, Maharashtra</p>
  </div>
</div>

<footer style="text-align:center; background:#1E90FF; color:white; padding:10px; margin-top:40px;">
  © 2025 Lifeline Multispeciality Hospital. All Rights Reserved.
</footer>

<!-- ✅ JavaScript for Success Alert -->
<script>
document.getElementById("contactForm").addEventListener("submit", function(event) {
  event.preventDefault();
  alert("✅ Message sent successfully!");
  this.reset();
});
</script>

</body>
</html>
