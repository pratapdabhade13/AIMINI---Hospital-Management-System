<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hospital Staff</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .table {
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h2 {
            color: #007bff;
            margin-top: 30px;
            margin-bottom: 20px;
        }
        th {
            background-color: #007bff;
            color: white;
            text-align: center;
        }
        td {
            text-align: center;
            vertical-align: middle;
        }
    </style>
</head>
<body>

<div class="container my-5">
    <h2 class="text-center">🏥 Hospital Staff Members</h2>
    <div class="table-responsive">
        <table class="table table-bordered table-striped align-middle">
            <thead>
                <tr>
                    <th>Sr. No</th>
                    <th>Staff Name</th>
                    <th>Role</th>
                    <th>Contact</th>
                    <th>Description</th>
                </tr>
            </thead>
            <tbody>
                {% for s in staff %}
                <tr>
                    <td>{{ loop.index }}</td>
                    <td>{{ s.name }}</td>
                    <td>{{ s.role }}</td>
                    <td>+91 98{{ '%04d'|format(loop.index * 37 % 10000) }}54321</td>
                    <td>Responsible for daily {{ s.role|lower }} operations in hospital.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
